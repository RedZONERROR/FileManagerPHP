name: Auto Release & Version Pump

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Calculate Next Version, Tag, and Push
        id: versioning
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch all tags to get correct history
          git fetch --tags
          
          # Get the latest tag or default to v1.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Parse version components (strip 'v' prefix)
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          # Auto-increment patch version
          new_patch=$((patch + 1))
          NEW_TAG="v$major.$minor.$new_patch"
          echo "New tag: $NEW_TAG"
          
          # Tag and push to origin
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          
          # Set output parameter for subsequent steps
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Build Clean Release Zip
        run: |
          # Package files excluding developer directories and git metadata
          zip -r FileManagerPHP.zip . -x "*.git*" ".github*" "data*" "storage*" "README.md" "LICENSE"

      - name: Create GitHub Release
        run: |
          # Use pre-installed GitHub CLI to create a release with the zip asset attached
          gh release create "${{ steps.versioning.outputs.new_tag }}" FileManagerPHP.zip \
            --title "Release ${{ steps.versioning.outputs.new_tag }}" \
            --notes "Automated release and version bump by GitHub Actions bot."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
